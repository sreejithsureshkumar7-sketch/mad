<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher Dashboard</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/style.css"></head>
<body onload="teacherGuard();loadStudents();loadAttendanceReport();"><header><div><h2>Madha Arts and Science College</h2><p>Teacher Dashboard</p></div><a href="index.html">Logout</a></header>
<main class="container"><section class="card"><h2>Filter Students & Attendance</h2><div class="filter-grid">
<select id="filterDepartment" onchange="loadStudents();loadAttendanceReport();"><option value="">All Departments</option>
<option>B.Sc Computer Science</option><option>BCA</option><option>B.Com</option><option>BBA</option>
<option>B.Sc Maths</option><option>B.Sc Physics</option><option>B.Sc Chemistry</option><option>BA English</option></select>
<select id="filterYear" onchange="loadStudents();loadAttendanceReport();"><option value="">All Years</option><option>1st Year</option><option>2nd Year</option><option>3rd Year</option></select>
<input id="searchBox" placeholder="Search name or register no" onkeyup="loadStudents()"></div></section>
<section class="card"><h2>Students List</h2><div class="table-wrap"><table><thead><tr><th>Name</th><th>Reg No</th><th>Department</th><th>Year</th><th>Email</th><th>Phone</th></tr></thead><tbody id="studentsTable"></tbody></table></div></section>
<section class="card"><h2>Attendance Report</h2><div class="stats"><span>Present: <b id="presentCount">0</b></span><span>Absent: <b id="absentCount">0</b></span><span>Total: <b id="totalCount">0</b></span><span>Percentage: <b id="attendancePercentage">0%</b></span></div><div class="export-buttons"><button onclick="downloadPDF()">Download PDF</button><button onclick="downloadExcel()">Download Excel</button></div>
<div class="table-wrap"><table><thead><tr><th>Date</th><th>Name</th><th>Reg No</th><th>Department</th><th>Year</th><th>Status</th><th>Marked By</th></tr></thead><tbody id="attendanceReport"></tbody></table></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script></body></html>
