<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Student Panel</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/style.css"></head>
<body><header><div><h2>Madha Arts and Science College</h2><p>Student Panel</p></div><a href="index.html">Home</a></header>
<main class="container"><section class="card"><h2>Student Registration</h2>
<input id="name" placeholder="Full Name"><input id="regno" placeholder="Register Number">
<select id="department"><option value="">Select Department</option>
<option>B.Sc Computer Science</option><option>BCA</option><option>B.Com</option><option>BBA</option>
<option>B.Sc Maths</option><option>B.Sc Physics</option><option>B.Sc Chemistry</option><option>BA English</option></select><select id="year"><option value="">Select Year</option><option>1st Year</option><option>2nd Year</option><option>3rd Year</option></select>
<input id="email" placeholder="Email"><input id="phone" placeholder="Phone Number">
<button onclick="registerStudent()">Save Student Details</button></section>
<section class="card"><h2>My Attendance</h2><input id="checkRegno" placeholder="Enter Register Number">
<button onclick="viewMyAttendance()">Check Attendance</button><div id="myAttendance"></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script></body></html>
